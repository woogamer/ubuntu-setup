# ── Tokyo Night tmux theme ──

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── General ──
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# ── Status bar ──
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#000000,fg=#888888"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#000000,bg=#ffffff,bold]  #S #[fg=#ffffff,bg=#000000] "
set -g status-right "#[fg=#333333]#[fg=#aaaaaa,bg=#333333]  %H:%M #[fg=#ffffff,bg=#333333]#[fg=#000000,bg=#ffffff,bold]  %m/%d "

# ── Window tabs ──
set -g window-status-format "#[fg=#333333,bg=#000000]#[fg=#888888,bg=#333333] #I  #W #[fg=#333333,bg=#000000]"
set -g window-status-current-format "#[fg=#222222,bg=#000000]#[fg=#ffffff,bg=#222222,bold] #I  #W #[fg=#222222,bg=#000000]"
set -g window-status-separator " "

# ── Pane borders ──
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#ffffff"

# ── Message style ──
set -g message-style "bg=#222222,fg=#ffffff"
set -g message-command-style "bg=#222222,fg=#ffffff"

# ── Copy mode ──
set -g mode-style "bg=#333333,fg=#ffffff"
setw -g mode-keys vi

# 마우스 드래그로 선택하면 자동으로 시스템 클립보드에 복사
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# vi 스타일 복사: v로 선택, y로 복사
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# Ctrl+Shift+V로 붙여넣기 (시스템 클립보드에서)
bind -n C-S-v run "xclip -selection clipboard -o | tmux load-buffer - && tmux paste-buffer"

# ── Better keybindings ──
# Prefix: Ctrl+a (easier than Ctrl+b)
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Split panes with | and -
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with Alt+arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ── Plugins ──
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
